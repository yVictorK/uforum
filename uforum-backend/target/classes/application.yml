spring:
  application:
    name: UForum

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:uforum_db}
    username: ${DB_USER:uforum_user}
    password: ${DB_PASSWORD:uforum_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        # Batch loading: carrega coleções lazy em lote em vez de 1 query por item (elimina N+1)
        default_batch_fetch_size: 20
        # Batch inserts/updates
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@uforum.ufam.edu.br}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:uforum-super-secret-key-must-be-at-least-32-chars-long}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXP:604800000}

app:
  upload-dir: ${UPLOAD_DIR:./uploads}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  ufam:
    email-domain: ufam.edu.br

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.ufam.uforum: INFO
    org.springframework.security: WARN
    # Descomente para ver queries SQL e diagnosticar lentidão:
    # org.hibernate.SQL: DEBUG
    # org.hibernate.orm.jdbc.bind: TRACE
